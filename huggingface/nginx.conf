# nginx for the Hugging Face Spaces all-in-one image. Listens on 7860 (the port
# HF exposes), serves the built SPA, and proxies the API + photos to the gateway
# running on 127.0.0.1:3000 inside the same container. All paths are chosen to be
# writable by a non-root user (HF may run the container as uid 1000).
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	access_log /dev/stdout;

	# Keep all temp/scratch under /tmp so a non-root user can write.
	client_body_temp_path /tmp/nginx-client;
	proxy_temp_path /tmp/nginx-proxy;
	fastcgi_temp_path /tmp/nginx-fastcgi;
	uwsgi_temp_path /tmp/nginx-uwsgi;
	scgi_temp_path /tmp/nginx-scgi;

	sendfile on;
	# Allow attendance photo uploads (gateway/multer caps at 5MB).
	client_max_body_size 10m;

	server {
		listen 7860;
		server_name _;
		root /app/frontend;
		index index.html;

		# API surface (gateway global prefix /api/v1) + Swagger at /api/docs.
		location /api/ {
			proxy_pass http://127.0.0.1:3000;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
		}

		# Attendance photos streamed by the gateway from MinIO.
		location /uploads/ {
			proxy_pass http://127.0.0.1:3000;
		}

		# Long-cache hashed build assets.
		location /assets/ {
			expires 1y;
			add_header Cache-Control "public, immutable";
			try_files $uri =404;
		}

		# SPA fallback.
		location / {
			try_files $uri $uri/ /index.html;
		}
	}
}
