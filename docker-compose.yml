# =============================================================================
# Dexa WFH Attendance - Local dev infrastructure (MySQL 8 + MinIO)
# =============================================================================
#
# This file provisions the BACKING SERVICES the microservices need locally:
#   - MySQL 8 with one schema per service (identity_db, employees_db,
#     attendances_db) created by infra/mysql-init on first init (PLAN §10.2).
#   - MinIO (S3-compatible object storage) for attendance photos (PLAN §10.4).
#
# The application services (gateway, identity, employees, attendances) run via
# npm during development; full containerisation is Tahap 11 (deployment).
#
# USAGE
# -----
#   1. Start infra in the background:
#        docker compose up -d
#   2. Wait until healthy:
#        docker compose ps
#   3. Run per-service migrations + seeders (see backend/README or each service):
#        (in backend/employees) npm run migration:run && npm run seed
#        (in backend/identity)   npm run migration:run && npm run seed
#        (in backend/attendances)npm run migration:run && npm run seed
#   4. Stop (keep data):          docker compose down
#      Stop AND wipe everything:  docker compose down -v
#
# NOTE: the schema-init script only runs on a FRESH volume. If you still have the
# monolith-phase volume, recreate it: docker compose down -v && docker compose up -d
#
# MinIO console: http://localhost:9001  (login with MINIO_ROOT_USER/PASSWORD)
# =============================================================================

services:
    mysql:
        image: mysql:8.0
        container_name: dexa-wfh-mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-identity_db}
            MYSQL_USER: ${MYSQL_USER:-dexa}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dexa_password}
        ports:
            - "${MYSQL_PORT:-3306}:3306"
        volumes:
            - dexa_mysql_data:/var/lib/mysql
            - ./infra/mysql-init:/docker-entrypoint-initdb.d:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
            interval: 10s
            timeout: 5s
            retries: 5

    minio:
        image: minio/minio:latest
        container_name: dexa-wfh-minio
        restart: unless-stopped
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
        ports:
            - "${MINIO_PORT:-9000}:9000"
            - "${MINIO_CONSOLE_PORT:-9001}:9001"
        volumes:
            - dexa_minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 10s
            timeout: 5s
            retries: 5

volumes:
    dexa_mysql_data:
    dexa_minio_data:
