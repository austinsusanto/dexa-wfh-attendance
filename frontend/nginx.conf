# nginx config for the built Vite SPA. Caddy terminates TLS and routes
# /api/* and /uploads/* to the gateway; everything else lands here. This server
# only needs to serve static assets and fall back to index.html for client-side
# routes (React Router).
server {
	listen 80;
	server_name _;
	root /usr/share/nginx/html;
	index index.html;

	# Long-cache hashed build assets.
	location /assets/ {
		expires 1y;
		add_header Cache-Control "public, immutable";
		try_files $uri =404;
	}

	# SPA fallback: unknown paths render the app shell, not a 404.
	location / {
		try_files $uri $uri/ /index.html;
	}
}
